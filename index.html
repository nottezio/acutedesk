      ],
      routine: [
        { en: "Echocardiogram (structural assessment, LVEF)", id: "Ekokardiografi (penilaian struktural, LVEF)" },
        { en: "Holter monitor / event recorder if intermittent", id: "Holter monitor / event recorder jika intermiten" },
        { en: "EP / Cardiology referral for pacemaker decision", id: "Rujukan EP / Kardiologi untuk keputusan pacemaker" },
        { en: "Medication reconciliation — culprit drug review", id: "Rekonsiliasi obat — telaah obat penyebab" }
      ]
    };

    const disposition = !isSymptomatic
      ? { en: "Telemetry observation; outpatient cardiology follow-up if persistent", id: "Observasi telemetri; follow-up kardiologi rawat jalan jika menetap" }
      : (rhythm === "mobitz_ii" || rhythm === "complete_av" || rhythm === "idioventricular")
      ? { en: "CCU / ICU — transvenous pacing wire + permanent pacemaker workup", id: "CCU / ICU — kawat pacu transvena + workup pacemaker permanen" }
      : { en: "Telemetry / step-down; EP consult", id: "Telemetri / step-down; konsul EP" };

    return {
      diagnosis: dx, subtitle: sub, cautions: flags,
      immediate, pharmacology: pharm,
      investigations, disposition,
      guideline: "AHA ACLS Adult Bradycardia Algorithm 2020; ACC/AHA/HRS Bradycardia & Conduction Delay 2018"
    };
  }
}

}; // end DISEASES


/* ===========================================================
 * UI ENGINE
 * =========================================================== */
const main = document.getElementById("main");

function snapshot() {
  return {
    view: state.view,
    diseaseId: state.diseaseId,
    stepIndex: state.stepIndex,
    answers: JSON.parse(JSON.stringify(state.answers)),
    complication: state.complication ? JSON.parse(JSON.stringify(state.complication)) : null,
    algorithmDiseaseId: state.algorithmDiseaseId
  };
}
function pushHistory() { state.history.push(snapshot()); }
function restore(s) {
  state.view = s.view; state.diseaseId = s.diseaseId; state.stepIndex = s.stepIndex;
  state.answers = s.answers; state.complication = s.complication;
  state.algorithmDiseaseId = s.algorithmDiseaseId;
}
function goBack() {
  if (state.history.length === 0) { resetAll(true); return; }
  restore(state.history.pop()); render();
}
function resetAll(force) {
  if (!force && state.view !== "menu" && !confirm(ui("confirmReset"))) return;
  state.view = "menu"; state.diseaseId = null; state.stepIndex = 0;
  state.answers = {}; state.history = []; state.complication = null;
  state.algorithmDiseaseId = null;
  render();
}
function selectDisease(id) {
  pushHistory();
  state.diseaseId = id; state.view = "step"; state.stepIndex = 0;
  state.answers = {}; state.complication = null;
  render();
}
function viewAlgorithm(id) {
  pushHistory();
  state.algorithmDiseaseId = id; state.view = "algorithm";
  render();
}
function getActiveSteps(disease) {
  const steps = (state.complication && disease.complicationSteps) ? disease.complicationSteps : disease.steps;
  return steps.filter(s => !s.showIf || s.showIf(state.answers));
}
function submitAnswer(value) {
  const disease = DISEASES[state.diseaseId];
  const steps = getActiveSteps(disease);
  const step = steps[state.stepIndex];
  if (!step) return;
  if (step.type === "numeric") {
    const n = parseFloat(value);
    if (isNaN(n)) { alert(ui("enterNumeric")); return; }
    value = n;
  }
  if (step.type === "multi-select") {
    if (!Array.isArray(value) || value.length === 0) { alert(ui("selectAtLeastOne")); return; }
  }
  if (step.type === "single-select" && (value === null || value === undefined || value === "")) {
    alert(ui("selectOption")); return;
  }
  pushHistory();
  state.answers[step.id] = value;
  if (step.triggers) {
    const trig = step.triggers(value, state.answers);
    if (trig && trig.disease && DISEASES[trig.disease]) {
      const parentAnswers = JSON.parse(JSON.stringify(state.answers));
      const parentId = state.diseaseId;
      if (trig.mode === "complication") {
        state.complication = { parentDisease: parentId, parentAnswers };
      } else {
        state.complication = null;
      }
      state.diseaseId = trig.disease; state.stepIndex = 0; state.answers = {};
      render(); return;
    }
  }
  const newSteps = getActiveSteps(DISEASES[state.diseaseId]);
  if (state.stepIndex < newSteps.length - 1) state.stepIndex++;
  else state.view = "recommendation";
  render();
}

/* ---------------- Render helpers ---------------- */
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined && text !== null) e.textContent = text;
  return e;
}
function btnEl(text, cls, onClick) {
  const b = document.createElement("button");
  b.className = cls; b.textContent = text; b.type = "button";
  b.addEventListener("click", onClick);
  return b;
}
function escapeHtml(s) {
  if (s === undefined || s === null) return "";
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderToolbar(includeBack) {
  const t = el("div", "toolbar");
  if (includeBack) t.appendChild(btnEl(ui("back"), "btn btn-ghost", goBack));
  t.appendChild(btnEl(ui("reset"), "btn btn-ghost", () => resetAll(false)));
  return t;
}

/* ---------------- Language toggle ---------------- */
function setLanguage(lang) {
  state.lang = lang;
  document.getElementById("langEn").classList.toggle("active", lang === "en");
  document.getElementById("langId").classList.toggle("active", lang === "id");
  document.getElementById("appTitle").textContent = ui("appTitle");
  document.getElementById("appSubtitle").textContent = ui("subtitle");
  document.getElementById("disclaimer").textContent = ui("disclaimer");
  document.getElementById("footer").innerHTML = ui("footerLine1") + "<br>" + ui("footerLine2");
  document.documentElement.lang = lang;
  render();
}
document.getElementById("langEn").addEventListener("click", () => setLanguage("en"));
document.getElementById("langId").addEventListener("click", () => setLanguage("id"));

/* ---------------- Main render ---------------- */
function render() {
  main.innerHTML = "";
  if (state.view === "menu") renderMenu();
  else if (state.view === "step") renderStep();
  else if (state.view === "recommendation") renderRecommendation();
  else if (state.view === "algorithm") renderAlgorithm();
  window.scrollTo(0, 0);
}

function renderMenu() {
  main.appendChild(el("div", "question", ui("menuTitle")));
  main.appendChild(el("div", "question-hint", ui("menuHint")));
  const grid = el("div", "menu-grid");
  Object.values(DISEASES).filter(d => d.standalone).forEach(d => {
    const card = document.createElement("button");
    card.className = "menu-card"; card.type = "button";
    card.appendChild(el("div", "title", `${d.icon}  ${tx(d.label)}`));
    card.appendChild(el("div", "meta", d.guideline));
    const algoLink = document.createElement("span");
    algoLink.className = "algo-link";
    algoLink.textContent = ui("viewAlgorithm");
    algoLink.setAttribute("role", "button");
    algoLink.setAttribute("tabindex", "0");
    algoLink.addEventListener("click", (e) => { e.stopPropagation(); viewAlgorithm(d.id); });
    algoLink.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); e.stopPropagation(); viewAlgorithm(d.id); } });
    card.appendChild(algoLink);
    card.addEventListener("click", () => selectDisease(d.id));
    grid.appendChild(card);
  });
  main.appendChild(grid);
}

function renderStepperBar(disease, steps) {
  const wrap = el("div", "stepper");
  if (state.complication) {
    const parent = DISEASES[state.complication.parentDisease];
    wrap.appendChild(el("span", "crumb", tx(parent.label)));
    wrap.appendChild(el("span", "arrow", "→"));
    wrap.appendChild(el("span", "crumb active", `${tx(disease.label)} (${ui("complication")})`));
    wrap.appendChild(el("span", "arrow", "→"));
    wrap.appendChild(el("span", "crumb", `${ui("step")} ${state.stepIndex + 1}/${steps.length}`));
  } else {
    wrap.appendChild(el("span", "crumb active", `${disease.icon} ${tx(disease.label)}`));
    wrap.appendChild(el("span", "arrow", "→"));
    wrap.appendChild(el("span", "crumb", `${ui("step")} ${state.stepIndex + 1} ${ui("of")} ${steps.length}`));
  }
  return wrap;
}

function renderStep() {
  const disease = DISEASES[state.diseaseId];
  const steps = getActiveSteps(disease);
  if (steps.length === 0 || state.stepIndex >= steps.length) {
    state.view = "recommendation"; render(); return;
  }
  const step = steps[state.stepIndex];
  main.appendChild(renderStepperBar(disease, steps));
  if (state.complication) {
    const parent = DISEASES[state.complication.parentDisease];
    main.appendChild(el("div", "complication-banner",
      ui("complicationBanner", { disease: tx(disease.label), parent: tx(parent.label) })));
  }
  main.appendChild(renderToolbar(true));
  main.appendChild(el("div", "question", tx(step.question)));
  if (step.hint) main.appendChild(el("div", "question-hint", tx(step.hint)));
  if (step.type === "single-select") renderSingleSelect(step);
  else if (step.type === "multi-select") renderMultiSelect(step);
  else if (step.type === "numeric") renderNumeric(step);
  else if (step.type === "boolean") renderBoolean(step);
}

function renderSingleSelect(step) {
  const wrap = el("div", "options");
  step.options.forEach(opt => {
    const b = document.createElement("button");
    b.className = "option"; b.type = "button";
    b.appendChild(el("span", "check radio", ""));
    b.appendChild(el("span", "", tx(opt.label)));
    b.addEventListener("click", () => submitAnswer(opt.value));
    wrap.appendChild(b);
  });
  main.appendChild(wrap);
}

function renderMultiSelect(step) {
  const wrap = el("div", "options");
  const selected = new Set();
  const stepNoneVal = step.options.find(x => x.value === "none")?.value;
  step.options.forEach(opt => {
    const b = document.createElement("button");
    b.className = "option"; b.type = "button";
    // Highlight absolute CIs in danger style
    if (typeof opt.value === "string" && opt.value.startsWith("abs_")) b.classList.add("danger-option");
    const check = el("span", "check", "");
    b.appendChild(check);
    b.appendChild(el("span", "", tx(opt.label)));
    b.addEventListener("click", () => {
      if (opt.value === "none") {
        selected.clear(); selected.add("none");
        wrap.querySelectorAll(".option").forEach(o => { o.classList.remove("selected"); o.querySelector(".check").textContent = ""; });
        b.classList.add("selected"); check.textContent = "✓";
      } else {
        if (selected.has("none")) {
          selected.delete("none");
          const noneIdx = step.options.findIndex(x => x.value === "none");
          if (noneIdx >= 0) {
            const noneBtn = wrap.children[noneIdx];
            if (noneBtn) { noneBtn.classList.remove("selected"); noneBtn.querySelector(".check").textContent = ""; }
          }
        }
        if (selected.has(opt.value)) {
          selected.delete(opt.value); b.classList.remove("selected"); check.textContent = "";
        } else {
          selected.add(opt.value); b.classList.add("selected"); check.textContent = "✓";
        }
      }
    });
    wrap.appendChild(b);
  });
  main.appendChild(wrap);
  const acts = el("div", "actions");
  acts.appendChild(btnEl(ui("continueBtn"), "btn btn-primary", () => submitAnswer(Array.from(selected))));
  main.appendChild(acts);
}

function renderNumeric(step) {
  const row = el("div", "numeric-row");
  const input = document.createElement("input");
  input.type = "number"; input.className = "numeric-input"; input.inputMode = "decimal";
  input.placeholder = ui("continueBtn");
  input.setAttribute("aria-label", tx(step.question));
  row.appendChild(input);
  if (step.unit) row.appendChild(el("span", "unit", step.unit));
  main.appendChild(row);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submitAnswer(input.value); });
  const acts = el("div", "actions");
  acts.appendChild(btnEl(ui("continueBtn"), "btn btn-primary", () => submitAnswer(input.value)));
  main.appendChild(acts);
  setTimeout(() => input.focus(), 50);
}

function renderBoolean(step) {
  const wrap = el("div", "options");
  [{ value: true, label: { en: "Yes", id: "Ya" } }, { value: false, label: { en: "No", id: "Tidak" } }].forEach(opt => {
    const b = document.createElement("button");
    b.className = "option"; b.type = "button";
    b.appendChild(el("span", "check radio")); b.appendChild(el("span", "", tx(opt.label)));
    b.addEventListener("click", () => submitAnswer(opt.value));
    wrap.appendChild(b);
  });
  main.appendChild(wrap);
}

/* ---------------- Recommendation render ---------------- */
function renderRecommendation() {
  const disease = DISEASES[state.diseaseId];
  const ctx = state.complication
    ? { entryMode: "complication", parentDisease: state.complication.parentDisease, parentAnswers: state.complication.parentAnswers }
    : { entryMode: "direct" };
  const rec = disease.getRecommendation(state.answers, ctx);
  main.appendChild(renderToolbar(true));
  const card = el("div", "rec-card");

  if (rec.parentContext) {
    card.appendChild(el("div", "rec-complication-banner",
      `⚠ ${tx({en:"Complication detected:", id:"Komplikasi terdeteksi:"})} ${tx(rec.diagnosis).replace(/^(COMPLICATION:|KOMPLIKASI:)\s*/, "")} ${tx({en:"in the context of",id:"dalam konteks"})} ${rec.parentContext.parentLabel}`));
  }

  const head = el("div", "rec-header");
  head.appendChild(el("div", "dx-label", ui("diagnosis")));
  head.appendChild(el("div", "dx", tx(rec.diagnosis)));
  if (rec.subtitle) head.appendChild(el("div", "sub", tx(rec.subtitle)));
  card.appendChild(head);

  // Dynamic CI summary (ACS)
  if (rec.ciSummary && rec.ciSummary.length) {
    const sum = el("div", "rec-section");
    const ci = el("div", "ci-summary");
    const strong = el("strong", "", ui("ciSummaryHeader"));
    ci.appendChild(strong);
    const ul = document.createElement("ul"); ul.style.paddingLeft = "18px"; ul.style.listStyle = "disc"; ul.style.margin = "4px 0 0";
    rec.ciSummary.forEach(it => {
      const li = document.createElement("li"); li.style.padding = "2px 0";
      li.textContent = tx(it); ul.appendChild(li);
    });
    ci.appendChild(ul);
    sum.appendChild(ci);
    card.appendChild(sum);
  }

  if (rec.cautions && rec.cautions.length) {
    const s = el("div", "rec-section");
    s.appendChild(el("h3", "", ui("cautionFlags")));
    rec.cautions.forEach(f => s.appendChild(el("div", "flag-card", tx(f))));
    card.appendChild(s);
  }

  if (rec.parentContext && rec.parentContext.keyReminders && rec.parentContext.keyReminders.length) {
    const s = el("div", "rec-section");
    s.appendChild(el("h3", "", ui("parentReminders", { label: rec.parentContext.parentLabel })));
    const ul = el("ul", "");
    rec.parentContext.keyReminders.forEach(r => ul.appendChild(el("li", "", tx(r))));
    s.appendChild(ul);
    card.appendChild(s);
  }

  if (rec.immediate && rec.immediate.length) {
    const s = el("div", "rec-section");
    const h = el("h3"); h.textContent = ui("immediateActions") + " ";
    h.appendChild(el("span", "timer", ui("immediateTimer")));
    s.appendChild(h);
    const ul = el("ul");
    rec.immediate.forEach(i => ul.appendChild(el("li", "", tx(i))));
    s.appendChild(ul);
    card.appendChild(s);
  }

  if (rec.pharmacology && rec.pharmacology.length) {
    const s = el("div", "rec-section");
    s.appendChild(el("h3", "", ui("pharmacology")));
    const tbl = document.createElement("table"); tbl.className = "drug-table";
    const thead = document.createElement("thead");
    thead.innerHTML = `<tr><th>${escapeHtml(ui("agent"))}</th><th>${escapeHtml(ui("doseRoute"))}</th><th>${escapeHtml(ui("timingNotes"))}</th></tr>`;
    tbl.appendChild(thead);
    const tbody = document.createElement("tbody");
    rec.pharmacology.forEach(p => {
      const tr = document.createElement("tr");
      if (p.isHeader) {
        const td = document.createElement("td"); td.colSpan = 3;
        td.style.background = "var(--bg-soft)"; td.style.fontWeight = "700"; td.style.fontSize = "12px";
        td.style.textTransform = "uppercase"; td.style.letterSpacing = "0.4px";
        td.style.color = "var(--text-soft)"; td.style.padding = "8px 6px";
        td.textContent = p.name;
        tr.appendChild(td);
      } else {
        const c1 = document.createElement("td");
        c1.innerHTML = `<span class="drug-name">${escapeHtml(p.name)}</span>`;
        const c2 = document.createElement("td");
        c2.innerHTML = (p.dose ? escapeHtml(p.dose) : "—") + (p.route ? `<br><span style="color:var(--text-mute);font-size:13px">${escapeHtml(p.route)}</span>` : "");
        const c3 = document.createElement("td");
        const timingTxt = p.timing ? tx(p.timing) : "";
        const ciTxt = p.ci ? tx(p.ci) : "";
        c3.innerHTML = (timingTxt ? escapeHtml(timingTxt) : "") + (ciTxt ? `<span class="ci">${escapeHtml(ui("ci"))}: ${escapeHtml(ciTxt)}</span>` : "");
        tr.appendChild(c1); tr.appendChild(c2); tr.appendChild(c3);
      }
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    s.appendChild(tbl);
    card.appendChild(s);
  }

  if (rec.investigations) {
    const s = el("div", "rec-section");
    s.appendChild(el("h3", "", ui("investigations")));
    if (rec.investigations.stat && rec.investigations.stat.length) {
      const g = el("div", "invest-group");
      g.appendChild(el("span", "badge badge-stat", ui("stat")));
      const ul = el("ul");
      rec.investigations.stat.forEach(i => ul.appendChild(el("li", "", tx(i))));
      g.appendChild(ul); s.appendChild(g);
    }
    if (rec.investigations.routine && rec.investigations.routine.length) {
      const g = el("div", "invest-group");
      g.appendChild(el("span", "badge badge-routine", ui("routine")));
      const ul = el("ul");
      rec.investigations.routine.forEach(i => ul.appendChild(el("li", "", tx(i))));
      g.appendChild(ul); s.appendChild(g);
    }
    card.appendChild(s);
  }

  if (rec.disposition) {
    const s = el("div", "rec-section");
    s.appendChild(el("h3", "", ui("disposition")));
    const ul = el("ul");
    ul.appendChild(el("li", "", tx(rec.disposition)));
    s.appendChild(ul);
    card.appendChild(s);
  }

  if (rec.guideline) {
    card.appendChild(el("div", "guideline-footer", ui("source") + rec.guideline));
  }

  main.appendChild(card);

  const acts = el("div", "actions");
  acts.appendChild(btnEl(ui("modifyEntries"), "btn btn-ghost", goBack));
  acts.appendChild(btnEl(ui("newPatient"), "btn btn-primary", () => resetAll(true)));
  main.appendChild(acts);
}

/* ---------------- Algorithm view ---------------- */
function describeShowIf(step) {
  // Heuristic: render a brief textual description for a showIf condition.
  // We can't introspect the function reliably, so we provide a generic note.
  return tx({ en: "Conditional — depends on earlier answers", id: "Kondisional — bergantung jawaban sebelumnya" });
}

function renderAlgorithm() {
  const disease = DISEASES[state.algorithmDiseaseId];
  const toolbar = el("div", "toolbar");
  toolbar.appendChild(btnEl(ui("algorithmReturn"), "btn btn-ghost", () => resetAll(true)));
  toolbar.appendChild(btnEl(ui("back"), "btn btn-ghost", goBack));
  main.appendChild(toolbar);

  main.appendChild(el("div", "question", ui("algorithmTitle", { label: tx(disease.label) })));
  main.appendChild(el("div", "question-hint", ui("algorithmDescription")));
  main.appendChild(el("div", "guideline-footer", ui("source") + disease.guideline));

  const wrap = el("div", "algo-wrap");

  // Standalone steps
  const allStepSets = [{ label: { en: "Standalone flow", id: "Alur mandiri" }, steps: disease.steps }];
  if (disease.complicationSteps) {
    allStepSets.push({ label: { en: "Complication entry flow (when triggered from a parent disease)", id: "Alur masuk sebagai komplikasi (saat dipicu penyakit induk)" }, steps: disease.complicationSteps });
  }

  allStepSets.forEach(set => {
    const title = el("div", "algo-section-title", tx(set.label));
    wrap.appendChild(title);
    set.steps.forEach((step, i) => {
      const node = el("div", "algo-node");
      node.appendChild(el("div", "algo-node-q", `${ui("algorithmStep")} ${i + 1}: ${tx(step.question)}`));
      if (step.hint) node.appendChild(el("div", "algo-node-hint", ui("algorithmHint") + " " + tx(step.hint)));
      if (step.showIf) {
        const cond = el("div", "algo-branch cond"); cond.textContent = ui("algorithmShowIf") + " " + describeShowIf(step);
        node.appendChild(cond);
      }
      const typeLabel = step.type === "numeric"
        ? tx({ en: `Numeric input (${step.unit || "value"})`, id: `Input numerik (${step.unit || "nilai"})` })
        : step.type === "single-select" ? tx({ en: "Single choice — Options:", id: "Pilihan tunggal — Opsi:" })
        : step.type === "multi-select" ? tx({ en: "Multi-select — Options:", id: "Pilihan ganda — Opsi:" })
        : tx({ en: "Boolean — Yes/No", id: "Boolean — Ya/Tidak" });
      const typeRow = el("div", "algo-branch"); typeRow.textContent = typeLabel;
      node.appendChild(typeRow);
      if (step.options) {
        step.options.forEach(opt => {
          const ob = el("div", "algo-branch"); ob.textContent = "• " + tx(opt.label);
          node.appendChild(ob);
        });
      }
      if (step.triggers) {
        const trig = el("div", "algo-branch trigger");
        trig.textContent = ui("algorithmTrigger") + " " + tx({ en: "switches to another disease module based on selection (e.g. cardiogenic shock as complication)", id: "berpindah ke modul penyakit lain berdasarkan pilihan (mis. syok kardiogenik sebagai komplikasi)" });
        node.appendChild(trig);
      }
      wrap.appendChild(node);
    });
  });

  // Outputs description
  const outTitle = el("div", "algo-section-title", ui("algorithmOutputs"));
  wrap.appendChild(outTitle);
  const outNode = el("div", "algo-terminal");
  outNode.textContent = tx({
    en: "After the final step the engine renders: Diagnosis · Caution Flags · Immediate Actions (first 10 min) · Pharmacology (drug · dose · route · timing · CI) · Investigations (STAT & routine) · Disposition · Guideline source. Recommendations adapt dynamically to all answers — including biomarker availability and contraindication checklists.",
    id: "Setelah langkah akhir engine merender: Diagnosis · Peringatan · Tindakan Segera (10 menit pertama) · Farmakologi (obat · dosis · rute · waktu · KI) · Pemeriksaan (CITO & rutin) · Disposisi · Sumber pedoman. Rekomendasi beradaptasi dinamis terhadap semua jawaban — termasuk ketersediaan biomarker dan checklist kontraindikasi."
  });
  wrap.appendChild(outNode);

  main.appendChild(wrap);

  const acts = el("div", "actions");
  acts.appendChild(btnEl(ui("algorithmReturn"), "btn btn-ghost", () => resetAll(true)));
  acts.appendChild(btnEl(tx({ en: "Start case →", id: "Mulai kasus →" }), "btn btn-primary", () => selectDisease(disease.id)));
  main.appendChild(acts);
}

/* ---------------- Init ---------------- */
setLanguage("en");
</script>
