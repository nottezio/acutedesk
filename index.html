<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedside Clinical Decision Support v2.0</title>
<style>
:root {
  --bg: #ffffff;
  --text: #1a1a1a;
  --text-soft: #4a4a4a;
  --text-mute: #6b6b6b;
  --accent: #0056B3;
  --accent-soft: #e6f0fa;
  --accent-dark: #003d7a;
  --border: #d4d4d4;
  --border-strong: #999999;
  --bg-soft: #f5f6f8;
  --bg-card: #ffffff;
  --warn: #b00020;
  --warn-bg: #fbe9eb;
  --warn-soft: #fff3f5;
  --ok: #1b5e20;
  --ok-bg: #e8f5e9;
  --tap: 44px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg); color: var(--text);
  font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
  min-height: 100vh; padding: 0;
}
button { font-family: inherit; }
.app { max-width: 760px; margin: 0 auto; padding: 16px; }

.header { border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.header-title h1 { font-size: 18px; color: var(--accent); font-weight: 700; letter-spacing: 0.3px; }
.header-title .subtitle { font-size: 13px; color: var(--text-mute); margin-top: 2px; }
.header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.lang-toggle { display: flex; border: 1.5px solid var(--accent); border-radius: 4px; overflow: hidden; }
.lang-toggle button {
  min-height: 32px; padding: 4px 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  background: var(--bg); color: var(--accent); border: 0; cursor: pointer; border-right: 1px solid var(--accent);
}
.lang-toggle button:last-child { border-right: 0; }
.lang-toggle button.active { background: var(--accent); color: #fff; }

.disclaimer { background: var(--warn-soft); border-left: 4px solid var(--warn); padding: 10px 12px; font-size: 13px; color: var(--warn); margin-bottom: 16px; font-weight: 500; }

.toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.btn {
  min-height: var(--tap); min-width: var(--tap); padding: 10px 16px;
  font-size: 15px; font-weight: 600; border: 1.5px solid var(--accent);
  background: var(--bg); color: var(--accent); cursor: pointer; border-radius: 4px;
}
.btn:hover, .btn:focus { background: var(--accent-soft); outline: none; }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover, .btn-primary:focus { background: var(--accent-dark); color: #fff; }
.btn-ghost { border-color: var(--border-strong); color: var(--text); }
.btn-ghost:hover, .btn-ghost:focus { background: var(--bg-soft); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm { min-height: 36px; padding: 6px 12px; font-size: 13px; }

.stepper { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-mute); margin-bottom: 12px; flex-wrap: wrap; }
.stepper .crumb { padding: 4px 8px; border: 1px solid var(--border); background: var(--bg-soft); border-radius: 3px; white-space: nowrap; }
.stepper .crumb.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.stepper .arrow { color: var(--border-strong); }

.menu-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
@media (min-width: 600px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
.menu-card {
  min-height: var(--tap); padding: 16px; border: 1.5px solid var(--border); background: var(--bg-card);
  cursor: pointer; text-align: left; border-radius: 6px; font-size: 16px; color: var(--text);
  display: flex; flex-direction: column; gap: 4px; position: relative;
}
.menu-card:hover, .menu-card:focus { border-color: var(--accent); background: var(--accent-soft); outline: none; }
.menu-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.menu-card .title { font-weight: 700; font-size: 16px; color: var(--accent); padding-right: 80px; }
.menu-card .meta { font-size: 12px; color: var(--text-mute); padding-right: 80px; }
.menu-card .algo-link {
  position: absolute; top: 10px; right: 10px; font-size: 11px; color: var(--accent);
  background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 3px;
  padding: 4px 8px; font-weight: 600; text-decoration: none; cursor: pointer;
}
.menu-card .algo-link:hover { background: var(--accent); color: #fff; }

.question { font-size: 18px; font-weight: 700; margin: 8px 0 10px; color: var(--text); line-height: 1.35; }
.question-hint { font-size: 13px; color: var(--text-mute); margin-bottom: 12px; line-height: 1.4; }

.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  min-height: var(--tap); padding: 12px 14px; border: 1.5px solid var(--border); background: var(--bg-card);
  cursor: pointer; text-align: left; border-radius: 5px; font-size: 15px; color: var(--text);
  display: flex; align-items: center; gap: 10px; line-height: 1.35;
}
.option:hover, .option:focus { border-color: var(--accent); background: var(--accent-soft); outline: none; }
.option:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.option.selected { border-color: var(--accent); background: var(--accent-soft); }
.option .check {
  width: 22px; height: 22px; border: 1.5px solid var(--border-strong); border-radius: 3px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--accent); background: #fff;
}
.option.selected .check { background: var(--accent); border-color: var(--accent); color: #fff; }
.option .check.radio { border-radius: 50%; }
.option.danger-option { border-color: var(--warn); }
.option.danger-option.selected { background: var(--warn-bg); border-color: var(--warn); }
.option.danger-option.selected .check { background: var(--warn); border-color: var(--warn); }

.numeric-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.numeric-input { flex: 1; min-height: var(--tap); padding: 10px 14px; font-size: 16px; border: 1.5px solid var(--border); border-radius: 5px; font-family: inherit; background: #fff; }
.numeric-input:focus { outline: none; border-color: var(--accent); }
.numeric-row .unit { font-size: 14px; color: var(--text-mute); font-weight: 600; }

.actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

.rec-card { border: 1.5px solid var(--accent); border-radius: 6px; overflow: hidden; margin-top: 8px; }
.rec-header { background: var(--accent); color: #fff; padding: 14px 16px; }
.rec-header .dx-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.85; font-weight: 600; }
.rec-header .dx { font-size: 20px; font-weight: 700; margin-top: 2px; line-height: 1.25; }
.rec-header .sub { font-size: 14px; opacity: 0.9; margin-top: 4px; }
.rec-complication-banner { background: var(--warn); color: #fff; padding: 10px 14px; font-size: 14px; font-weight: 600; }

.rec-section { padding: 14px 16px; border-top: 1px solid var(--border); }
.rec-section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-soft); margin-bottom: 8px; font-weight: 700; }
.rec-section ul { list-style: none; padding: 0; }
.rec-section ul li { padding: 6px 0 6px 18px; position: relative; font-size: 14.5px; line-height: 1.45; }
.rec-section ul li::before { content: "▸"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
.rec-section .timer { font-size: 11px; color: var(--text-mute); font-style: italic; text-transform: none; letter-spacing: 0; }

.drug-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.drug-table th, .drug-table td { padding: 8px 6px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border); }
.drug-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-soft); background: var(--bg-soft); }
.drug-table .drug-name { font-weight: 700; color: var(--text); }
.drug-table .ci { font-size: 12px; color: var(--warn); margin-top: 3px; display: block; font-weight: 600; }

.invest-group { margin-bottom: 8px; }
.invest-group:last-child { margin-bottom: 0; }

.badge { display: inline-block; padding: 3px 8px; font-size: 11px; font-weight: 700; border-radius: 3px; margin-right: 6px; text-transform: uppercase; letter-spacing: 0.4px; vertical-align: middle; }
.badge-stat { background: var(--warn); color: #fff; }
.badge-routine { background: var(--bg-soft); color: var(--text-soft); border: 1px solid var(--border); }

.flag-card { background: var(--warn-bg); border: 1.5px solid var(--warn); border-radius: 5px; padding: 10px 12px; font-size: 14px; color: var(--warn); margin-bottom: 8px; font-weight: 600; line-height: 1.4; }
.flag-card::before { content: "⚠ "; font-weight: bold; }

.guideline-footer { font-size: 12px; color: var(--text-mute); font-style: italic; padding: 10px 16px; background: var(--bg-soft); border-top: 1px solid var(--border); }

.complication-banner { background: var(--warn-bg); border: 1.5px solid var(--warn); padding: 10px 12px; font-size: 14px; color: var(--warn); font-weight: 600; margin-bottom: 12px; border-radius: 4px; line-height: 1.4; }
.context-banner { background: var(--accent-soft); border: 1px solid var(--accent); padding: 8px 12px; font-size: 13px; color: var(--accent-dark); margin-bottom: 12px; border-radius: 4px; line-height: 1.4; }

/* Algorithm view */
.algo-wrap { font-size: 14px; line-height: 1.5; }
.algo-node { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; border-left: 3px solid var(--accent); background: var(--bg-soft); }
.algo-node-q { font-weight: 700; color: var(--text); margin-bottom: 4px; }
.algo-node-hint { font-size: 12px; color: var(--text-mute); font-style: italic; margin-bottom: 6px; }
.algo-branch { padding: 4px 8px; margin: 3px 0 3px 16px; background: var(--bg); border-left: 2px solid var(--border); font-size: 13px; }
.algo-branch.cond { color: var(--accent-dark); }
.algo-branch.trigger { color: var(--warn); font-weight: 600; }
.algo-section-title { font-weight: 700; color: var(--accent); margin-top: 14px; margin-bottom: 6px; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
.algo-terminal { background: var(--accent-soft); border: 1px dashed var(--accent); padding: 8px 10px; border-radius: 4px; font-size: 13px; margin-top: 8px; }

.ci-summary { background: var(--warn-soft); border: 1px solid var(--warn); padding: 10px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; color: var(--warn); line-height: 1.4; }
.ci-summary strong { display: block; margin-bottom: 4px; font-size: 13px; }

.footer { text-align: center; font-size: 12px; color: var(--text-mute); margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--border); line-height: 1.5; }

@media (max-width: 420px) {
  .app { padding: 12px; }
  .header-title h1 { font-size: 16px; }
  .question { font-size: 17px; }
  .option { font-size: 14.5px; }
  .menu-card { padding: 14px; }
  .menu-card .title, .menu-card .meta { padding-right: 70px; }
  .drug-table { font-size: 13px; }
  .drug-table th { font-size: 10px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-title">
      <h1 id="appTitle">BEDSIDE CLINICAL DECISION SUPPORT</h1>
      <div class="subtitle" id="appSubtitle">Evidence-based acute care · v2.0</div>
    </div>
    <div class="header-actions">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button id="langEn" class="active" type="button">EN</button>
        <button id="langId" type="button">ID</button>
      </div>
    </div>
  </header>
  <div class="disclaimer" id="disclaimer">⚠ For clinical decision support only. Always apply clinical judgment.</div>
  <main id="main" aria-live="polite"></main>
  <footer class="footer" id="footer">
    Guideline sources: ESC · ACC/AHA · AHA ACLS · Surviving Sepsis Campaign · SCAI<br>
    Always verify drug doses against local protocols and patient-specific factors.
  </footer>
</div>

<script>
"use strict";

/* ===========================================================
 * STATE
 * =========================================================== */
const state = {
  view: "menu",            // 'menu' | 'step' | 'recommendation' | 'algorithm'
  lang: "en",              // 'en' | 'id'
  diseaseId: null,
  stepIndex: 0,
  answers: {},
  history: [],
  complication: null,      // { parentDisease, parentAnswers }
  algorithmDiseaseId: null // when viewing full algorithm
};

/* ===========================================================
 * TRANSLATION HELPER
 *   tx(val): val may be a string (returned as-is) or {en, id}
 * =========================================================== */
function tx(val) {
  if (val == null) return "";
  if (typeof val === "object" && (val.en !== undefined || val.id !== undefined)) {
    return val[state.lang] != null ? val[state.lang] : (val.en || val.id || "");
  }
  return String(val);
}

/* ===========================================================
 * UI STRINGS (chrome)
 * =========================================================== */
const UI = {
  appTitle: { en: "BEDSIDE CLINICAL DECISION SUPPORT", id: "PENDUKUNG KEPUTUSAN KLINIS BEDSIDE" },
  subtitle: { en: "Evidence-based acute care · v2.0", id: "Layanan akut berbasis bukti · v2.0" },
  disclaimer: { en: "⚠ For clinical decision support only. Always apply clinical judgment.", id: "⚠ Hanya alat bantu keputusan klinis. Selalu gunakan pertimbangan klinis." },
  footerLine1: { en: "Guideline sources: ESC · ACC/AHA · AHA ACLS · Surviving Sepsis Campaign · SCAI", id: "Sumber pedoman: ESC · ACC/AHA · AHA ACLS · Surviving Sepsis Campaign · SCAI" },
  footerLine2: { en: "Always verify drug doses against local protocols and patient-specific factors.", id: "Selalu verifikasi dosis obat sesuai protokol lokal dan faktor pasien." },
  menuTitle: { en: "Select clinical presentation", id: "Pilih presentasi klinis" },
  menuHint: { en: "Each module follows current guideline-based pathways. Tap any condition to begin, or tap \"View algorithm\" to see the complete decision tree.", id: "Setiap modul mengikuti alur pedoman terkini. Sentuh kondisi untuk memulai, atau sentuh \"Lihat algoritme\" untuk melihat pohon keputusan lengkap." },
  viewAlgorithm: { en: "View algorithm", id: "Lihat algoritme" },
  back: { en: "← Back", id: "← Kembali" },
  reset: { en: "↺ Reset / New Patient", id: "↺ Reset / Pasien Baru" },

  continueBtn: { en: "Continue →", id: "Lanjut →" },
  step: { en: "Step", id: "Langkah" },
  of: { en: "of", id: "dari" },
  complication: { en: "complication", id: "komplikasi" },
  complicationBanner: { en: "Complication subflow detected: {disease} arising from {parent}. Additional data required.", id: "Subalur komplikasi terdeteksi: {disease} timbul dari {parent}. Data tambahan diperlukan." },
  diagnosis: { en: "Diagnosis", id: "Diagnosis" },
  cautionFlags: { en: "🚩 Caution Flags", id: "🚩 Peringatan" },
  parentReminders: { en: "Parent condition reminders — {label}", id: "Pengingat kondisi induk — {label}" },
  immediateActions: { en: "Immediate Actions", id: "Tindakan Segera" },
  immediateTimer: { en: "(first 10 min)", id: "(10 menit pertama)" },
  pharmacology: { en: "Pharmacology", id: "Farmakologi" },
  agent: { en: "Agent", id: "Obat" },
  doseRoute: { en: "Dose / Route", id: "Dosis / Rute" },
  timingNotes: { en: "Timing & Notes", id: "Waktu & Catatan" },
  investigations: { en: "Investigations", id: "Pemeriksaan" },
  stat: { en: "STAT", id: "CITO" },
  routine: { en: "Routine", id: "Rutin" },
  disposition: { en: "Disposition", id: "Disposisi" },
  source: { en: "Source: ", id: "Sumber: " },
  ci: { en: "CI", id: "KI" },
  algorithmTitle: { en: "Full algorithm — {label}", id: "Algoritme lengkap — {label}" },
  algorithmReturn: { en: "← Back to menu", id: "← Kembali ke menu" },
  algorithmStep: { en: "Step", id: "Langkah" },
  algorithmOptions: { en: "Options:", id: "Pilihan:" },
  algorithmHint: { en: "Hint:", id: "Petunjuk:" },
  algorithmShowIf: { en: "Shown when:", id: "Ditampilkan jika:" },
  algorithmTrigger: { en: "→ Triggers:", id: "→ Memicu:" },
  algorithmOutputs: { en: "Decision outputs", id: "Keluaran keputusan" },
  algorithmDescription: { en: "Complete decision tree. Numbers reference step order; conditional branches and triggers are noted.", id: "Pohon keputusan lengkap. Nomor adalah urutan langkah; cabang kondisional dan pemicu ditandai." },
  confirmReset: { en: "Reset all entries and return to main menu?", id: "Reset semua jawaban dan kembali ke menu utama?" },
  selectAtLeastOne: { en: "Select at least one option (or 'None').", id: "Pilih minimal satu opsi (atau 'Tidak ada')." },
  selectOption: { en: "Select an option to continue.", id: "Pilih salah satu opsi untuk lanjut." },
  enterNumeric: { en: "Please enter a numeric value.", id: "Silakan masukkan angka." },
  ciSummaryHeader: { en: "Contraindications acknowledged — pathway adjusted:", id: "Kontraindikasi tercatat — alur disesuaikan:" },
  none: { en: "None", id: "Tidak ada" },
  yes: { en: "Yes", id: "Ya" },
  no: { en: "No", id: "Tidak" }
};

function ui(key, replacements) {
  let s = tx(UI[key]) || key;
  if (replacements) {
    for (const k in replacements) s = s.replace("{" + k + "}", replacements[k]);
  }
  return s;
}

/* ===========================================================
 * COMMON OPTION FRAGMENTS (reused across diseases)
 * =========================================================== */
const NONE_OPT = { value: "none", label: { en: "None", id: "Tidak ada" } };

/* ===========================================================
 * DISEASES REGISTRY
 * =========================================================== */
const DISEASES = {

/* ---------------------- ACS ---------------------- */
acs: {
  id: "acs",
  label: { en: "Acute Coronary Syndrome", id: "Sindrom Koroner Akut" },
  icon: "❤",
  guideline: "ESC ACS 2023 / ACC-AHA 2025",
  standalone: true,
  steps: [
    {
      id: "presentation",
      question: { en: "Clinical presentation suspicious for ACS?", id: "Presentasi klinis mencurigakan SKA?" },
      hint: { en: "Anginal chest pain or equivalent ≥10 min, suspected ischemia.", id: "Nyeri dada angina atau setara ≥10 menit, dicurigai iskemia." },
      type: "single-select",
      options: [
        { value: "ongoing", label: { en: "Ongoing ischemic symptoms", id: "Gejala iskemik aktif" } },
        { value: "resolved", label: { en: "Symptoms resolved, recent (<24 h)", id: "Gejala mereda, baru (<24 jam)" } },
        { value: "recurrent", label: { en: "Recurrent / crescendo angina", id: "Angina rekuren / crescendo" } }
      ]
    },
    {
      id: "ecg",
      question: { en: "12-lead ECG findings? (acquire & interpret ≤10 min of FMC)", id: "Temuan EKG 12-sadapan? (rekam & baca ≤10 menit setelah kontak medis pertama)" },
      type: "single-select",
      options: [
        { value: "stemi", label: { en: "ST elevation ≥1 mm in 2 contiguous leads (or new LBBB / paced rhythm with Sgarbossa)", id: "ST elevasi ≥1 mm pada 2 sadapan kontigu (atau LBBB baru / irama pacu dengan kriteria Sgarbossa)" } },
        { value: "posterior", label: { en: "Posterior STEMI: ST↓ V1–V3 + tall R, ST↑ V7–V9", id: "STEMI posterior: ST↓ V1–V3 + R tinggi, ST↑ V7–V9" } },
        { value: "nste_dynamic", label: { en: "Dynamic ST depression ≥0.5 mm and/or T-wave inversion", id: "ST depresi dinamis ≥0,5 mm dan/atau inversi gelombang T" } },
        { value: "nondiag", label: { en: "Normal / non-diagnostic ECG", id: "EKG normal / non-diagnostik" } }
      ]
    },
    {
      id: "biomarker",
      question: { en: "Which cardiac biomarker assay is available at your facility today?", id: "Asai biomarker jantung mana yang tersedia di fasilitas Anda saat ini?" },
      hint: { en: "Determines serial sampling protocol and interpretation thresholds.", id: "Menentukan protokol sampling serial dan ambang interpretasi." },
      type: "single-select",
      options: [
        { value: "hs_ctn", label: { en: "hs-cTn (high-sensitivity Troponin I or T) — 0/1h or 0/2h ESC algorithm", id: "hs-cTn (Troponin I atau T sensitivitas tinggi) — algoritme ESC 0/1 jam atau 0/2 jam" } },
        { value: "conv_ctn", label: { en: "Conventional Troponin I or T (standard sensitivity) — 0/3h or 0/6h serial", id: "Troponin I atau T konvensional (sensitivitas standar) — serial 0/3 jam atau 0/6 jam" } },
        { value: "ckmb", label: { en: "CK-MB only (no troponin available) — q4–6h kinetics", id: "Hanya CK-MB (tidak ada troponin) — kinetika q4–6 jam" } },
        { value: "none_yet", label: { en: "No biomarker available / results pending", id: "Tidak ada biomarker / hasil belum keluar" } }
      ]
    },
    {
      id: "troponin",
      question: { en: "Biomarker result?", id: "Hasil biomarker?" },
      hint: { en: "Diagnosis requires rise / fall pattern + clinical context. A single value alone does not equal MI.", id: "Diagnosis memerlukan pola rise / fall + konteks klinis. Satu nilai saja bukan MI." },
      type: "single-select",
      showIf: a => a.ecg === "nste_dynamic" || a.ecg === "nondiag",
      options: [
        { value: "elevated", label: { en: "Elevated above 99th-percentile URL with Δ rise/fall → NSTEMI", id: "Meningkat di atas persentil-99 URL dengan Δ rise/fall → NSTEMI" } },
        { value: "borderline", label: { en: "Borderline / intermediate → continue serial sampling per algorithm", id: "Borderline / intermediate → lanjut sampling serial sesuai algoritme" } },
        { value: "normal", label: { en: "Normal serial values within algorithm → rule-out (consider UA if high clinical suspicion)", id: "Nilai serial normal dalam algoritme → rule-out (pertimbangkan UA jika kecurigaan klinis tinggi)" } },
        { value: "pending", label: { en: "Pending — first sample obtained", id: "Belum keluar — sampel pertama sudah diambil" } }
      ]
    },
    {
      id: "territory",

  getRecommendation: function(a, ctx) {
    const isSTEMI = a.ecg === "stemi" || a.ecg === "posterior";
    const fbCI = Array.isArray(a.fibrinolysis_ci) ? a.fibrinolysis_ci : [];
    const daptCI = Array.isArray(a.dapt_ci) ? a.dapt_ci : [];
    const acCI = Array.isArray(a.anticoag_ci) ? a.anticoag_ci : [];
    const comps = Array.isArray(a.complications) ? a.complications : [];

    // Detect absolute fibrinolysis CI -> override pathway
    const hasAbsoluteFbCI = fbCI.some(c => c.startsWith("abs_"));
    const hasRelativeFbCI = fbCI.some(c => c.startsWith("rel_"));
    const effectivePCIAccess = (a.pci_access === "no_no_ci" && hasAbsoluteFbCI) ? "no_with_ci" : a.pci_access;

    // Diagnosis label
    const territoryMap = {
      anterior: { en: "Anterior (LAD)", id: "Anterior (LAD)" },
      inferior: { en: "Inferior (RCA / LCx)", id: "Inferior (RCA / LCx)" },
      lateral: { en: "Lateral", id: "Lateral" },
      posterior: { en: "Posterior", id: "Posterior" },
      rv: { en: "Inferior + RV", id: "Inferior + RV" }
    };
    let dx, sub;
    if (isSTEMI) {
      dx = "STEMI";
      sub = a.territory ? tx(territoryMap[a.territory]) : { en: "Territory not specified", id: "Teritori belum ditentukan" };
    } else if (a.troponin === "elevated" || a.troponin === "borderline") {
      dx = "NSTEMI"; sub = { en: "Non-ST-elevation MI", id: "Infark miokard non-elevasi ST" };
    } else if (a.troponin === "normal") {
      dx = { en: "ACS ruled out by biomarker protocol", id: "SKA tersingkir per protokol biomarker" };
      sub = { en: "Consider UA if persistent high suspicion", id: "Pertimbangkan UA jika kecurigaan tetap tinggi" };
    } else {
      dx = { en: "Suspected ACS — diagnosis pending", id: "Dugaan SKA — diagnosis belum tegak" };
      sub = { en: "Serial biomarker and ECG required", id: "Biomarker serial dan EKG diperlukan" };
    }

    // Caution flags
    const flags = [];
    if (hasAbsoluteFbCI) flags.push({ en: "Absolute fibrinolysis contraindication detected — lysis pathway suppressed. URGENT TRANSFER for primary PCI regardless of delay.", id: "Kontraindikasi absolut fibrinolisis terdeteksi — alur lisis dihentikan. RUJUK SEGERA untuk primary PCI tanpa memperhatikan keterlambatan." });
    if (hasRelativeFbCI && !hasAbsoluteFbCI) flags.push({ en: "Relative fibrinolysis contraindication(s) — proceed only after weighing bleeding risk; prefer PCI if transfer feasible.", id: "Kontraindikasi relatif fibrinolisis — lanjutkan hanya setelah menimbang risiko perdarahan; lebih utamakan PCI jika rujukan memungkinkan." });
    if (daptCI.includes("active_bleed_dapt")) flags.push({ en: "Active major bleeding — DAPT contraindicated. Stabilize bleeding, consider isolated aspirin (low dose), discuss reduced/delayed P2Y12 with cardiology.", id: "Perdarahan mayor aktif — DAPT kontraindikasi. Stabilkan perdarahan, pertimbangkan aspirin saja (dosis rendah), diskusikan P2Y12 yang dikurangi/ditunda dengan kardiologi." });
    if (daptCI.includes("prior_stroke_tia")) flags.push({ en: "Prior stroke / TIA — PRASUGREL CONTRAINDICATED. Use ticagrelor (if no ICH) or clopidogrel.", id: "Riwayat stroke / TIA — PRASUGREL KONTRAINDIKASI. Gunakan ticagrelor (jika tidak ada ICH) atau clopidogrel." });
    if (daptCI.includes("prior_ich_p2y12")) flags.push({ en: "Prior intracranial hemorrhage — prasugrel CONTRAINDICATED; ticagrelor avoided. Use clopidogrel.", id: "Riwayat perdarahan intrakranial — prasugrel KONTRAINDIKASI; ticagrelor dihindari. Gunakan clopidogrel." });
    if (daptCI.includes("urgent_cabg")) flags.push({ en: "Likely urgent CABG — avoid ticagrelor (5-day washout) and prasugrel (7-day). Consider cangrelor IV peri-PCI as bridge.", id: "Kemungkinan CABG urgen — hindari ticagrelor (washout 5 hari) dan prasugrel (7 hari). Pertimbangkan cangrelor IV peri-PCI sebagai bridging." });
    if (acCI.includes("hit_history")) flags.push({ en: "HIT history — AVOID all heparins. Use bivalirudin (PCI) or argatroban.", id: "Riwayat HIT — HINDARI semua heparin. Gunakan bivalirudin (PCI) atau argatroban." });
    if (acCI.includes("active_bleed_ac")) flags.push({ en: "Active bleeding — anticoagulation high-risk. Bivalirudin (shorter half-life) preferred if PCI needed; otherwise delay until bleeding controlled.", id: "Perdarahan aktif — antikoagulasi berisiko tinggi. Bivalirudin (waktu paruh lebih pendek) lebih utama jika PCI diperlukan; bila tidak, tunda hingga perdarahan terkontrol." });
    if (comps.includes("rv")) flags.push({ en: "RV infarction — preload-dependent. AVOID nitrates, opioids, diuretics. Give IV fluid bolus (250–500 mL crystalloid) and consider inotropy.", id: "Infark RV — preload-dependent. HINDARI nitrat, opioid, diuretik. Berikan bolus cairan IV (250–500 mL kristaloid) dan pertimbangkan inotrop." });
    if (comps.includes("mech")) flags.push({ en: "Mechanical complication — emergency echo + surgical consultation. Bridge with vasopressors / mechanical support.", id: "Komplikasi mekanis — ekokardiografi darurat + konsul bedah. Bridging dengan vasopresor / mechanical support." });
    if (comps.includes("vt")) flags.push({ en: "VT/VF — ACLS protocol. Amiodarone 300 mg IV bolus for shock-refractory VF/pVT.", id: "VT/VF — protokol ACLS. Amiodaron 300 mg IV bolus untuk VF/pVT refrakter syok." });
    if (comps.includes("av_block")) flags.push({ en: "High-grade AV block — atropine 0.5–1 mg IV; transcutaneous pacing pads ready; transvenous pacing if symptomatic.", id: "Blok AV derajat tinggi — atropin 0,5–1 mg IV; siapkan pad pacu transkutan; pacu transvena bila simtomatik." });

    // Immediate actions
    const reperfMsg = isSTEMI
      ? (effectivePCIAccess === "yes"
          ? { en: "Activate cath lab — door-to-wire ≤90 min (≤60 min if onsite PCI center). Consider direct field transfer to PCI center.", id: "Aktivasi cath lab — door-to-wire ≤90 menit (≤60 menit jika PCI center on-site). Pertimbangkan transfer lapangan langsung ke PCI center." }
          : effectivePCIAccess === "no_no_ci"
            ? { en: "Administer fibrinolytic ≤10 min of STEMI diagnosis. Transfer to PCI center for routine angiography 2–24 h post-lysis (pharmaco-invasive).", id: "Berikan fibrinolitik ≤10 menit sejak diagnosis STEMI. Transfer ke PCI center untuk angiografi rutin 2–24 jam pasca-lisis (farmako-invasif)." }
            : { en: "Transfer to PCI center IMMEDIATELY for rescue PCI — fibrinolysis contraindicated.", id: "Rujuk SEGERA ke PCI center untuk rescue PCI — fibrinolisis kontraindikasi." })
      : (a.risk === "very_high" ? { en: "Cath lab activation — invasive strategy <2 h.", id: "Aktivasi cath lab — strategi invasif <2 jam." }
        : a.risk === "high" ? { en: "Admit. Invasive strategy <24 h.", id: "Rawat. Strategi invasif <24 jam." }
        : a.risk === "intermediate" ? { en: "Admit telemetry. Invasive 24–72 h.", id: "Rawat telemetri. Invasif 24–72 jam." }
        : a.risk === "low" ? { en: "Admit telemetry / observation. Non-invasive testing before discharge.", id: "Rawat telemetri / observasi. Tes non-invasif sebelum pulang." }
        : { en: "Admit telemetry; serial ECG / biomarker per algorithm.", id: "Rawat telemetri; EKG / biomarker serial sesuai algoritme." });

    // Biomarker-aware serial sampling guidance
    const biomarkerGuide = a.biomarker === "hs_ctn"
      ? { en: "Serial hs-cTn at 0 / 1 h (ESC rapid algorithm). Rule-in / rule-out cutoffs are assay-specific (consult kit insert).", id: "hs-cTn serial pada 0 / 1 jam (algoritme cepat ESC). Cut-off rule-in / rule-out bergantung asai (lihat insert kit)." }
      : a.biomarker === "conv_ctn"
      ? { en: "Serial conventional cTn at 0, 3 h (and 6 h if intermediate). Significant change is ≥20% rise/fall. Slower diagnostic turnaround.", id: "cTn konvensional serial pada 0, 3 jam (dan 6 jam jika intermediate). Perubahan signifikan ≥20% rise/fall. Turnaround diagnostik lebih lambat." }
      : a.biomarker === "ckmb"
      ? { en: "CK-MB at 0, 4–6, 12 h. Less sensitive than troponin — use only when troponin unavailable. Useful for reinfarction (faster clearance).", id: "CK-MB pada 0, 4–6, 12 jam. Kurang sensitif dibanding troponin — gunakan hanya jika troponin tidak tersedia. Berguna untuk reinfark (clearance lebih cepat)." }
      : { en: "Obtain biomarker as soon as available; do not delay reperfusion in STEMI awaiting troponin.", id: "Ambil biomarker secepat tersedia; jangan tunda reperfusi pada STEMI menunggu troponin." };

    const immediate = [
      { en: "Continuous cardiac monitoring, IV access × 2, SpO₂ monitor", id: "Monitor jantung kontinu, akses IV × 2, monitor SpO₂" },
      { en: "Supplemental O₂ only if SpO₂ <90% (avoid hyperoxia)", id: "O₂ suplemen hanya jika SpO₂ <90% (hindari hiperoksia)" },
      { en: "12-lead ECG every 15–30 min until reperfusion / diagnosis clear", id: "EKG 12-sadapan setiap 15–30 menit hingga reperfusi / diagnosis jelas" },
      { en: "Defibrillator at bedside; ACLS-ready environment", id: "Defibrilator di samping tempat tidur; lingkungan siap ACLS" },
      reperfMsg,
      biomarkerGuide
    ];

    // Pharmacology
    const pharm = [];

    // Aspirin (skip if anaphylaxis)
    if (!daptCI.includes("asa_allergy") && !daptCI.includes("active_bleed_dapt")) {
      pharm.push({ name: "Aspirin", dose: "150–300 mg", route: "PO chewed (or 75–250 mg IV)", timing: { en: "Loading dose — ASAP", id: "Dosis loading — segera" }, ci: { en: "Active major bleeding, true ASA allergy", id: "Perdarahan mayor aktif, alergi aspirin sejati" } });
    } else if (daptCI.includes("active_bleed_dapt")) {
      pharm.push({ name: "Aspirin", dose: "—", route: "—", timing: { en: "HELD — active bleeding. Resume once hemostasis achieved.", id: "DITUNDA — perdarahan aktif. Lanjutkan setelah hemostasis tercapai." }, ci: "" });
    } else if (daptCI.includes("asa_allergy")) {
      pharm.push({ name: "Aspirin", dose: "—", route: "—", timing: { en: "HELD — true allergy. Consider rapid desensitization protocol if confirmed ACS and PCI required.", id: "DITUNDA — alergi sejati. Pertimbangkan protokol desensitisasi cepat jika SKA terkonfirmasi dan PCI diperlukan." }, ci: "" });
    }

    // P2Y12 selection
    if (!daptCI.includes("active_bleed_dapt")) {
      pharm.push({ name: "P2Y12 inhibitor (choose ONE based on contraindications)", dose: "", route: "", timing: "", isHeader: true });
      const ticagrelorBlocked = daptCI.includes("prior_ich_p2y12") || daptCI.includes("urgent_cabg") || daptCI.includes("severe_hepatic");
      const prasugrelBlocked = daptCI.includes("prior_stroke_tia") || daptCI.includes("prior_ich_p2y12") || daptCI.includes("urgent_cabg") || daptCI.includes("severe_hepatic");
      if (!ticagrelorBlocked) {
        pharm.push({ name: "  • Ticagrelor", dose: "180 mg load → 90 mg BID", route: "PO", timing: { en: "Preferred for ACS (esp. invasive)", id: "Pilihan utama SKA (terutama strategi invasif)" }, ci: { en: "Prior ICH, active bleeding, severe hepatic impairment", id: "Riwayat ICH, perdarahan aktif, gangguan hati berat" } });
      }
      if (!prasugrelBlocked) {
        const prasDose = daptCI.includes("age_75_low_wt") ? "60 mg load → 5 mg daily" : "60 mg load → 10 mg daily";
        pharm.push({ name: "  • Prasugrel", dose: prasDose, route: "PO", timing: { en: "STEMI undergoing PCI — give after coronary anatomy known if NSTE-ACS", id: "STEMI dengan PCI — berikan setelah anatomi koroner diketahui pada NSTE-SKA" }, ci: { en: "Prior stroke/TIA (absolute), bleeding, ≥75 y or <60 kg (relative — dose reduce)", id: "Riwayat stroke/TIA (absolut), perdarahan, ≥75 thn atau <60 kg (relatif — kurangi dosis)" } });
      }
      pharm.push({ name: "  • Clopidogrel", dose: "600 mg load (300 mg if lysis, no load if >75 y on lysis) → 75 mg daily", route: "PO", timing: { en: "Fallback if ticagrelor & prasugrel contraindicated. Mandatory choice for fibrinolysis.", id: "Cadangan jika ticagrelor & prasugrel kontraindikasi. Pilihan wajib untuk fibrinolisis." }, ci: { en: "Active bleeding", id: "Perdarahan aktif" } });
      if (daptCI.includes("urgent_cabg")) {

        { en: "CBC, electrolytes, BUN/Cr, glucose, lipid panel, hs-CRP", id: "CBC, elektrolit, BUN/Cr, glukosa, panel lipid, hs-CRP" },
        { en: "Coagulation: PT/INR, aPTT", id: "Koagulasi: PT/INR, aPTT" },
        { en: "CXR (rule out alternative dx, before PCI/lysis)", id: "Foto toraks (singkirkan dx lain, sebelum PCI/lisis)" }

      : { en: "Telemetry ward, serial work-up", id: "Bangsal telemetri, work-up serial" };

    // CI Summary for output card
    let ciSummary = null;
    if (fbCI.length || daptCI.length || acCI.length) {
      const items = [];
      if (hasAbsoluteFbCI) items.push({ en: "Fibrinolysis: absolute CI → PCI-only pathway", id: "Fibrinolisis: KI absolut → alur PCI saja" });

      if (items.length) ciSummary = items;
    }

    return {

      disposition: disposition,

        { value: "hfpef", label: { en: "HFpEF (LVEF ≥50%)", id: "HFpEF (LVEF ≥50%)" } },

        { value: "pe", label: { en: "Pulmonary embolism", id: "Emboli paru" } },
        { value: "renal", label: { en: "Worsening renal function / volume overload", id: "Penurunan fungsi ginjal / overload" } },

        { value: "aki", label: { en: "Worsening renal function / cardiorenal syndrome", id: "Penurunan fungsi ginjal / sindrom kardiorenal" } },
        { value: "diuretic_resist", label: { en: "Diuretic resistance (UO <100 mL/h after escalation)", id: "Resistensi diuretik (UO <100 mL/jam setelah eskalasi)" } },

        ? { disease: "cardiogenic_shock", mode: "complication" } : null

  ],
  getRecommendation: function(a, ctx) {
    const profile = (a.perfusion === "warm" && a.congestion === "wet") ? "Warm-Wet"
                  : (a.perfusion === "cold" && a.congestion === "wet") ? "Cold-Wet"
                  : (a.perfusion === "cold" && a.congestion === "dry") ? "Cold-Dry"
                  : "Warm-Dry";

    const flags = [];
    const comps = Array.isArray(a.complications) ? a.complications : [];
    if (profile === "Cold-Wet" || profile === "Cold-Dry")
      flags.push({ en: "Hypoperfused — early inotrope; involve ICU/CCU; consider mechanical support evaluation.", id: "Hipoperfusi — inotrop dini; libatkan ICU/CCU; pertimbangkan evaluasi mechanical support." });
    if (a.trigger === "acs")
      flags.push({ en: "ACS-triggered AHF — emergent revascularization is priority. Run ACS pathway in parallel.", id: "AHF dipicu SKA — revaskularisasi emergensi prioritas. Jalankan alur SKA paralel." });
    if (a.trigger === "pe")
      flags.push({ en: "PE-triggered — PESI stratification, anticoagulate, thrombolysis if unstable.", id: "Dipicu PE — stratifikasi PESI, antikoagulasi, trombolisis jika tidak stabil." });
    if (comps.includes("aki"))
      flags.push({ en: "Cardiorenal — diuretic dose ↑ rather than withholding; add thiazide; monitor K, Mg.", id: "Kardiorenal — naikkan dosis diuretik (jangan stop); tambahkan tiazid; monitor K, Mg." });

      flags.push({ en: "Diuretic resistance — bolus → continuous infusion + thiazide; check albumin & Na; consider ultrafiltration.", id: "Resistensi diuretik — bolus → infus kontinu + tiazid; cek albumin & Na; pertimbangkan ultrafiltrasi." });

    const immediate = [
      { en: "Cardiac monitor, SpO₂, NIBP, IV access; urinary catheter for hourly UO", id: "Monitor jantung, SpO₂, NIBP, akses IV; kateter urin untuk UO per jam" },
      { en: "O₂ only if SpO₂ <90% (avoid hyperoxia)", id: "O₂ hanya jika SpO₂ <90% (hindari hiperoksia)" },
      { en: "NIV (CPAP/BiPAP) if respiratory distress (RR >25, SpO₂ <90% on O₂)", id: "NIV (CPAP/BiPAP) jika distress respirasi (RR >25, SpO₂ <90% dengan O₂)" },
      { en: "Daily weights; strict I/O; target net negative 1–3 L/day in Wet phenotype", id: "Timbang harian; I/O ketat; target net negatif 1–3 L/hari pada fenotipe Basah" },
      { en: "Hold ACEi/ARB/ARNI temporarily if SBP <90, AKI Stage 2+, or hyperkalemia — restart pre-discharge", id: "Tunda sementara ACEi/ARB/ARNI jika TDS <90, AKI Stage 2+, atau hiperkalemia — lanjutkan sebelum pulang" }
    ];

    const pharm = [];
    if (a.congestion === "wet") {
      pharm.push({ name: "Furosemide (IV)", dose: "Loop-naive: 20–40 mg IV bolus. Chronic loop: 1.0–2.5× daily oral dose IV.", route: "IV bolus → consider infusion 5–20 mg/h", timing: { en: "Goal UO 100–150 mL/h or spot urine Na >50–70 mmol/L at 2 h. If not met → double bolus.", id: "Target UO 100–150 mL/jam atau Na urin >50–70 mmol/L pada 2 jam. Jika tidak tercapai → gandakan bolus." }, ci: { en: "Severe hypovolemia, anuria not due to congestion", id: "Hipovolemia berat, anuria bukan akibat kongesti" } });
      pharm.push({ name: "Metolazone (for diuretic resistance)", dose: "2.5–10 mg PO daily, 30 min before loop", route: "PO", timing: { en: "Add when loop alone insufficient — sequential nephron blockade. Monitor Na, K, Mg q12h.", id: "Tambahkan saat loop saja tidak cukup — blok nefron sekuensial. Monitor Na, K, Mg q12 jam." }, ci: { en: "Severe hyponatremia, sulfa allergy", id: "Hiponatremia berat, alergi sulfa" } });
    }
    if (profile === "Cold-Wet" || profile === "Cold-Dry") {
      pharm.push({ name: "Dobutamine", dose: "2.5–10 mcg/kg/min (max 20)", route: "IV infusion", timing: { en: "Short-term inotropy. Wean ASAP — chronic use ↑ mortality.", id: "Inotrop jangka pendek. Wean secepatnya — penggunaan kronik ↑ mortalitas." }, ci: { en: "HOCM, severe AS, untreated tachyarrhythmia", id: "HOCM, AS berat, takiaritmia belum terkontrol" } });
      pharm.push({ name: "Milrinone", dose: "0.125–0.75 mcg/kg/min (skip loading dose in acute setting)", route: "IV infusion", timing: { en: "Preferred over dobutamine if on chronic β-blocker. Dose-reduce in renal impairment.", id: "Lebih disukai daripada dobutamin jika dalam β-blocker kronik. Kurangi dosis pada gangguan ginjal." }, ci: { en: "Severe AS/MS outflow obstruction, marked hypotension", id: "Obstruksi outflow AS/MS berat, hipotensi nyata" } });
      pharm.push({ name: "Norepinephrine", dose: "0.05–0.5 mcg/kg/min, titrate to MAP ≥65", route: "IV infusion (central)", timing: { en: "If SBP <90 / shock — combine with inotrope.", id: "Jika TDS <90 / syok — kombinasi dengan inotrop." }, ci: { en: "Mesenteric ischemia (relative)", id: "Iskemia mesenterik (relatif)" } });
    }
    if (a.trigger === "htn" || (profile === "Warm-Wet" && a.perfusion === "warm")) {
      pharm.push({ name: "Nitroglycerin", dose: "10–20 mcg/min start, titrate to 50–200 mcg/min", route: "IV infusion", timing: { en: "Hypertensive AHF / persistent congestion with adequate BP", id: "AHF hipertensif / kongesti persisten dengan TD adekuat" }, ci: { en: "SBP <110, RV infarct, PDE5 use, severe AS", id: "TDS <110, infark RV, penggunaan PDE5, AS berat" } });
    }
    pharm.push({ name: "Continue GDMT if tolerated", dose: "β-blocker, ACEi/ARB/ARNI, MRA, SGLT2-i", route: "PO", timing: { en: "Hold only for shock, SBP <90, AKI ≥ stage 2, or hyperkalemia. Restart in-hospital before discharge.", id: "Tunda hanya untuk syok, TDS <90, AKI ≥ stage 2, atau hiperkalemia. Lanjutkan di RS sebelum pulang." }, ci: "" });
    pharm.push({ name: "Initiate SGLT2 inhibitor", dose: "Empagliflozin 10 mg or Dapagliflozin 10 mg daily", route: "PO", timing: { en: "Class I (any HF phenotype). Start during admission once euvolemic and Cr stable; reduces re-hospitalization (EMPULSE).", id: "Kelas I (semua fenotipe HF). Mulai saat rawat setelah euvolemik dan Cr stabil; kurangi rehospitalisasi (EMPULSE)." }, ci: { en: "eGFR <20 (empa) / <25 (dapa), T1DM, DKA history, active GU infection", id: "eGFR <20 (empa) / <25 (dapa), DM tipe 1, riwayat KAD, infeksi GU aktif" } });
    pharm.push({ name: "VTE prophylaxis", dose: "Enoxaparin 40 mg SC daily (or UFH 5000 U BID/TID)", route: "SC", timing: { en: "All immobile AHF patients without contraindication", id: "Semua pasien AHF imobil tanpa kontraindikasi" }, ci: { en: "Active major bleeding, severe thrombocytopenia", id: "Perdarahan mayor aktif, trombositopenia berat" } });

    const investigations = {
      stat: [
        { en: "ECG, troponin (rule out ACS trigger)", id: "EKG, troponin (singkirkan pemicu SKA)" },
        { en: "BNP / NT-proBNP", id: "BNP / NT-proBNP" },
        { en: "Bedside echo (LVEF, RV, valves, IVC, pericardium)", id: "Eko bedside (LVEF, RV, katup, IVC, perikardium)" },
        { en: "CXR, lung US (B-lines, effusions)", id: "Foto toraks, USG paru (B-lines, efusi)" },
        { en: "Basic metabolic panel, magnesium, CBC", id: "Panel metabolik dasar, magnesium, CBC" },
        { en: "Lactate, ABG/VBG if hypoperfused", id: "Laktat, AGD/VBG jika hipoperfusi" }
      ],
      routine: [
        { en: "Iron studies — IV ferric carboxymaltose if iron deficient (AFFIRM-AHF)", id: "Studi besi — feric carboxymaltose IV jika defisiensi besi (AFFIRM-AHF)" },
        { en: "HbA1c, lipid panel, TSH", id: "HbA1c, panel lipid, TSH" },
        { en: "Liver enzymes (congestive hepatopathy)", id: "Enzim hati (hepatopati kongestif)" },
        { en: "Sleep study if suspicion of sleep-disordered breathing", id: "Studi tidur jika curiga sleep-disordered breathing" }
      ]
    };

    const dispo = (profile === "Cold-Wet" || comps.includes("cgs"))
      ? { en: "CCU / ICU", id: "CCU / ICU" }
      : (profile === "Cold-Dry" || comps.includes("diuretic_resist"))
        ? { en: "HDU / step-down", id: "HDU / step-down" }
        : { en: "Cardiology ward with telemetry", id: "Bangsal kardiologi dengan telemetri" };

    return {
      diagnosis: { en: "Acute Decompensated Heart Failure", id: "Gagal Jantung Dekompensasi Akut" },
      subtitle: `${profile} · ${a.hf_type ? a.hf_type.toUpperCase() : "phenotype TBD"}${a.trigger && a.trigger !== "unknown" ? " · " + a.trigger.toUpperCase() : ""}`,
      cautions: flags,
      immediate: immediate,
      pharmacology: pharm,
      investigations: investigations,
      disposition: dispo,
      guideline: "ESC HF Guidelines 2021 + 2023 focused update; AHA/ACC/HFSA HF 2022"
    };
  }
},

      ]
    },
    { id: "bp", question: { en: "Systolic BP (mmHg)?", id: "TD sistolik (mmHg)?" }, type: "numeric", unit: "mmHg" },
    {
      id: "lactate",

      type: "single-select",
      options: [
        { value: "normal", label: { en: "<2 mmol/L", id: "<2 mmol/L" } },
        { value: "elevated", label: { en: "2–4 mmol/L", id: "2–4 mmol/L" } },
        { value: "severe", label: { en: ">4 mmol/L (severe)", id: ">4 mmol/L (berat)" } },
        { value: "pending", label: { en: "Pending", id: "Belum ada" } }
      ]

  ],
  getRecommendation: function(a, ctx) {

    }
    let dx, sub, immediate = [], pharm = [], inv = { stat: [], routine: [] }, flags = [];

      ];
      pharm = [
        { name: "Empiric broad-spectrum antibiotic", dose: "Within 1 h. E.g.: piperacillin-tazobactam 4.5 g IV q6h ± vancomycin 25–30 mg/kg IV load; meropenem 1 g q8h if MDR risk", route: "IV", timing: { en: "≤1 h from recognition", id: "≤1 jam sejak pengenalan" }, ci: { en: "Tailor to allergies and renal function", id: "Sesuaikan alergi dan fungsi ginjal" } },
        { name: "Norepinephrine", dose: "0.05 mcg/kg/min, titrate to MAP ≥65", route: "IV (central preferred)", timing: { en: "First-line vasopressor (Class I)", id: "Vasopresor lini pertama (Kelas I)" }, ci: { en: "Severe tachyarrhythmia (caution)", id: "Takiaritmia berat (hati-hati)" } },
        { name: "Vasopressin", dose: "Fixed 0.03 U/min (do not titrate)", route: "IV infusion", timing: { en: "Add to norepi when MAP target not met (~0.25–0.5 mcg/kg/min) — catecholamine sparing", id: "Tambahkan ke norepi jika target MAP belum tercapai (~0,25–0,5 mcg/kg/menit) — hemat katekolamin" }, ci: { en: "Severe coronary / mesenteric ischemia", id: "Iskemia koroner / mesenterik berat" } },
        { name: "Epinephrine", dose: "0.05–0.5 mcg/kg/min", route: "IV infusion", timing: { en: "Second-line if norepi + vasopressin insufficient", id: "Lini kedua jika norepi + vasopressin tidak cukup" }, ci: { en: "Severe tachyarrhythmia", id: "Takiaritmia berat" } },
        { name: "Hydrocortisone", dose: "200 mg/day IV (50 mg q6h or continuous)", route: "IV", timing: { en: "Pressor-refractory shock (norepi ≥0.25 mcg/kg/min ≥4 h)", id: "Syok refrakter vasopresor (norepi ≥0,25 mcg/kg/menit ≥4 jam)" }, ci: { en: "Active fungal infection (relative)", id: "Infeksi jamur aktif (relatif)" } },
        { name: "Crystalloid (balanced)", dose: "30 mL/kg over 3 h, then dynamic indices", route: "IV bolus", timing: { en: "Initial resuscitation; avoid liberal further boluses", id: "Resusitasi awal; hindari bolus lanjut yang berlebihan" }, ci: { en: "Pulmonary edema, severe HF — titrate carefully", id: "Edema paru, HF berat — titrasi hati-hati" } }

  complicationSteps: [
    { id: "scai", question: { en: "SCAI Shock Stage?", id: "Stadium SCAI Shock?" }, type: "single-select",
      options: [
        { value: "B", label: { en: "B — Beginning shock", id: "B — Beginning shock" } },
        { value: "C", label: { en: "C — Classic shock", id: "C — Classic shock" } },
        { value: "D", label: { en: "D — Deteriorating", id: "D — Memburuk" } },
        { value: "E", label: { en: "E — Extremis", id: "E — Extremis" } }
      ]
    },
    { id: "sbp", question: { en: "Current systolic BP (mmHg)?", id: "TD sistolik saat ini (mmHg)?" }, type: "numeric", unit: "mmHg" },
    { id: "perfusion", question: { en: "Hypoperfusion features?", id: "Gambaran hipoperfusi?" }, type: "multi-select",
      options: [
        { value: "cold", label: { en: "Cold / mottled", id: "Dingin / mottled" } },
        { value: "oliguria", label: { en: "Oliguria <0.5 mL/kg/h", id: "Oliguria <0,5 mL/kg/jam" } },
        { value: "altered", label: { en: "Altered mentation", id: "Kesadaran berubah" } },
        { value: "lactate_2_4", label: { en: "Lactate 2–4 mmol/L", id: "Laktat 2–4 mmol/L" } },
        { value: "lactate_4", label: { en: "Lactate >4 mmol/L", id: "Laktat >4 mmol/L" } }
      ]
    },
    { id: "mcs", question: { en: "MCS availability?", id: "Ketersediaan MCS?" }, type: "single-select",
      options: [
        { value: "onsite", label: { en: "On-site (IABP/Impella/VA-ECMO)", id: "On-site (IABP/Impella/VA-ECMO)" } },
        { value: "transfer", label: { en: "Via transfer", id: "Via rujukan" } },
        { value: "none", label: { en: "Not available", id: "Tidak tersedia" } }
      ]
    }
  ],
  getRecommendation: function(a, ctx) {
    const isComplication = ctx && ctx.entryMode === "complication";
    const parent = isComplication ? DISEASES[ctx.parentDisease] : null;
    const parentAns = isComplication ? ctx.parentAnswers : null;

    let etiology = a.etiology;
    if (isComplication) {
      if (ctx.parentDisease === "acs") etiology = "ami";
      else if (ctx.parentDisease === "adhf") etiology = "adhf";
      else if (ctx.parentDisease === "pulm_edema") {
        etiology = parentAns && parentAns.etiology === "ischemic" ? "ami"
                : parentAns && parentAns.etiology === "valvular" ? "mech" : "adhf";
      }
    }

    const perfList = Array.isArray(a.perfusion) ? a.perfusion : [];
    const severeLactate = perfList.includes("lactate_4");
    const congested = isComplication ? true : (a.congestion === "wet");

    const flags = [];
    if (a.scai === "E") flags.push({ en: "SCAI Stage E — extremis. Immediate VA-ECMO / ECPR consideration. 30-day mortality >70%.", id: "SCAI Stadium E — extremis. Pertimbangkan VA-ECMO / ECPR segera. Mortalitas 30-hari >70%." });
    if (a.scai === "D") flags.push({ en: "SCAI Stage D — deteriorating. Escalate to MCS now; do not wait.", id: "SCAI Stadium D — memburuk. Eskalasi ke MCS sekarang; jangan menunggu." });
    if (severeLactate) flags.push({ en: "Lactate >4 mmol/L — predicts mortality; address perfusion aggressively, recheck q1–2 h.", id: "Laktat >4 mmol/L — prediktor mortalitas; atasi perfusi agresif, cek ulang q1–2 jam." });
    if (etiology === "ami") flags.push({ en: "AMI etiology — emergent culprit-only PCI is the single intervention with mortality benefit (CULPRIT-SHOCK). Do not perform multivessel PCI in same sitting.", id: "Etiologi AMI — PCI culprit-only emergensi adalah satu-satunya intervensi dengan manfaat mortalitas (CULPRIT-SHOCK). Jangan multivessel PCI dalam sesi yang sama." });
    if (etiology === "mech") flags.push({ en: "Mechanical complication — emergent cardiothoracic surgery consult. MCS as bridge.", id: "Komplikasi mekanis — konsul bedah kardiotorak emergensi. MCS sebagai bridging." });
    if (etiology === "tachy") flags.push({ en: "Tachyarrhythmia-driven — immediate synchronized cardioversion (or DC for VT/VF).", id: "Dipicu takiaritmia — kardioversi sinkron segera (atau DC untuk VT/VF)." });
    if (etiology === "brady") flags.push({ en: "Bradyarrhythmia — transcutaneous pacing immediately, transvenous pacing ASAP.", id: "Bradiaritmia — pacu transkutan segera, pacu transvena secepatnya." });
    if (a.mcs === "none" && (a.scai === "D" || a.scai === "E")) flags.push({ en: "MCS unavailable on-site at SCAI D/E — immediate transfer to shock-capable center.", id: "MCS tidak tersedia on-site pada SCAI D/E — rujuk segera ke shock center." });
    if (!congested) flags.push({ en: "Dry profile — small-volume crystalloid challenge (250 mL) acceptable; reassess; if still hypoperfused → inotrope.", id: "Profil kering — challenge kristaloid volume kecil (250 mL) dapat diterima; nilai ulang; jika masih hipoperfusi → inotrop." });

    const immediate = [
      { en: "Continuous monitoring: ECG, SpO₂, arterial line, central access, urinary catheter for hourly UO", id: "Monitor kontinu: EKG, SpO₂, jalur arteri, akses sentral, kateter urin per jam" },
      { en: "Maintain MAP ≥65 mmHg (some advocate ≥70 in established shock)", id: "Pertahankan MAP ≥65 mmHg (sebagian menganjurkan ≥70 pada syok mapan)" },
      { en: "Cautious O₂ — target SpO₂ 92–96%; ventilation if respiratory failure / for MCS", id: "O₂ hati-hati — target SpO₂ 92–96%; ventilasi jika gagal napas / untuk MCS" },
      etiology === "ami"
        ? { en: "Activate cath lab — emergent angiography + CULPRIT-ONLY PCI (Class I in CGS complicating AMI)", id: "Aktivasi cath lab — angiografi emergensi + PCI CULPRIT-ONLY (Kelas I pada CGS pasca-AMI)" }
        : etiology === "mech"
          ? { en: "Emergent cardiothoracic surgery consult; bedside TTE/TEE", id: "Konsul bedah kardiotorak emergensi; TTE/TEE bedside" }
          : { en: "Identify and reverse precipitant (rhythm, ischemia, infection, toxicity)", id: "Identifikasi dan koreksi pemicu (irama, iskemia, infeksi, toksisitas)" },
      { en: "Early shock team / HF / CT surgery discussion; consider transfer to high-volume shock center", id: "Diskusi dini shock team / HF / bedah jantung; pertimbangkan rujuk ke high-volume shock center" }
    ];
    if (a.mcs === "onsite" || a.mcs === "transfer") {
      immediate.push({ en: "Evaluate MCS escalation: IABP (modest support), Impella (LV unloading), VA-ECMO (full biventricular; ECLS-SHOCK 2023 = no mortality benefit in AMI-CGS, use selectively).", id: "Evaluasi eskalasi MCS: IABP (dukungan sedang), Impella (LV unloading), VA-ECMO (biventrikular penuh; ECLS-SHOCK 2023 = tidak ada manfaat mortalitas pada AMI-CGS, gunakan selektif)." });
    }

    const pharm = [];
    pharm.push({ name: "Norepinephrine (first-line vasopressor)", dose: "0.05 mcg/kg/min, titrate q5 min to MAP ≥65", route: "IV infusion (central preferred)", timing: { en: "Preferred over dopamine in cardiogenic shock — SOAP II showed lower mortality and fewer arrhythmias", id: "Lebih disukai daripada dopamin pada syok kardiogenik — SOAP II menunjukkan mortalitas lebih rendah dan aritmia lebih sedikit" }, ci: { en: "Severe tachyarrhythmia (caution)", id: "Takiaritmia berat (hati-hati)" } });
    pharm.push({ name: "Dobutamine", dose: "2.5–10 mcg/kg/min (max 20)", route: "IV infusion", timing: { en: "Add for inotropic support once MAP ≥65 with norepi. β1 agonist — caution if on chronic β-blocker.", id: "Tambahkan untuk dukungan inotropik setelah MAP ≥65 dengan norepi. Agonis β1 — hati-hati jika dalam β-blocker kronik." }, ci: { en: "Severe outflow obstruction, untreated tachyarrhythmia", id: "Obstruksi outflow berat, takiaritmia belum terkontrol" } });
    pharm.push({ name: "Milrinone (alternative inotrope)", dose: "0.125–0.5 mcg/kg/min (skip loading dose in shock)", route: "IV infusion", timing: { en: "Preferred if on chronic β-blocker or pulmonary HTN (PDE-3 inhibitor → pulmonary vasodilation). Renal dose adjustment.", id: "Lebih disukai jika dalam β-blocker kronik atau HTN pulmonal (inhibitor PDE-3 → vasodilatasi pulmonal). Sesuaikan dosis renal." }, ci: { en: "Severe hypotension, marked outflow obstruction", id: "Hipotensi berat, obstruksi outflow nyata" } });
    if (congested) {
      pharm.push({ name: "Furosemide IV", dose: "Loop-naive 20–40 mg IV; chronic loop 1–2.5× daily oral dose IV", route: "IV bolus ± infusion", timing: { en: "Once MAP restored — relieves congestion, improves perfusion gradient", id: "Setelah MAP pulih — atasi kongesti, perbaiki gradien perfusi" }, ci: { en: "Hypovolemia, severe AKI without congestion", id: "Hipovolemia, AKI berat tanpa kongesti" } });
    }
    if (etiology === "ami" && !isComplication) {
      pharm.push({ name: "Anticoagulation for PCI (UFH)", dose: "70–100 U/kg IV bolus, target ACT 250–350 s", route: "IV", timing: { en: "Peri-PCI in AMI-CGS", id: "Peri-PCI pada AMI-CGS" }, ci: { en: "HIT history, active bleeding", id: "Riwayat HIT, perdarahan aktif" } });
      pharm.push({ name: "DAPT loading", dose: "Aspirin 150–300 mg + P2Y12 (ticagrelor 180 mg PO OR cangrelor IV if NPO)", route: "PO / IV", timing: { en: "Before/during PCI for AMI-CGS", id: "Sebelum/saat PCI untuk AMI-CGS" }, ci: "" });
    }
    pharm.push({ name: "AVOID — Dopamine", dose: "—", route: "—", timing: { en: "Higher arrhythmia rate and increased mortality vs norepinephrine in CGS (SOAP II subgroup).", id: "Aritmia lebih tinggi dan mortalitas meningkat vs norepinefrin pada CGS (subgrup SOAP II)." }, ci: { en: "Avoid as first-line vasopressor in cardiogenic shock", id: "Hindari sebagai vasopresor lini pertama pada syok kardiogenik" } });
    pharm.push({ name: "AVOID — β-blockers, ACEi/ARB, MRA acutely", dose: "—", route: "—", timing: { en: "Hold chronic neurohormonal therapies during active shock. Reintroduce cautiously after stabilization.", id: "Tunda terapi neurohormonal kronik selama syok aktif. Mulai kembali hati-hati setelah stabil." }, ci: { en: "Active cardiogenic shock", id: "Syok kardiogenik aktif" } });

    const investigations = {
      stat: [
        { en: "12-lead ECG (q15 min until reperfusion)", id: "EKG 12-sadapan (q15 menit sampai reperfusi)" },
        { en: "Bedside echo (LVEF, RV, valves, pericardium, mechanical complications)", id: "Eko bedside (LVEF, RV, katup, perikardium, komplikasi mekanis)" },
        { en: "ABG with lactate (q1–2 h)", id: "AGD dengan laktat (q1–2 jam)" },
        { en: "Troponin, BNP/NT-proBNP", id: "Troponin, BNP/NT-proBNP" },
        { en: "CBC, CMP, coagulation, type & cross", id: "CBC, CMP, koagulasi, type & cross" },
        { en: "ScvO₂ if central line — target ≥65%", id: "ScvO₂ jika ada jalur sentral — target ≥65%" },
        { en: "CXR", id: "Foto toraks" },
        etiology === "ami" ? { en: "Emergent coronary angiography", id: "Angiografi koroner emergensi" } : null,
        etiology === "mech" ? { en: "TEE for valvular / VSD anatomy", id: "TEE untuk anatomi valvular / VSD" } : null
      ].filter(Boolean),
      routine: [
        { en: "Right heart catheterization (selected) — PCWP, CO, PVR, SvO₂", id: "Kateterisasi jantung kanan (selektif) — PCWP, CO, PVR, SvO₂" },
        { en: "Daily echo for ventricular recovery", id: "Eko harian untuk recovery ventrikel" },
        { en: "Liver function tests, daily lactate trend", id: "Tes fungsi hati, tren laktat harian" },
        { en: "Multidisciplinary shock-team rounds", id: "Ronde shock team multidisipliner" }
      ]
    };

    const dispoSuffix = (a.mcs === "transfer" || (a.mcs === "none" && (a.scai === "D" || a.scai === "E")));
    const disposition = dispoSuffix
      ? { en: "ICU / CCU at shock-capable center — urgent transfer if not on-site", id: "ICU / CCU di shock center — rujuk urgen jika tidak on-site" }
      : { en: "ICU / CCU at shock-capable center", id: "ICU / CCU di shock center" };

    let diagnosis, subtitle, parentContext = null;
    if (isComplication) {
      diagnosis = { en: "COMPLICATION: Cardiogenic Shock", id: "KOMPLIKASI: Syok Kardiogenik" };
      subtitle = { en: `arising in the context of ${tx(parent.label)}`, id: `timbul dalam konteks ${tx(parent.label)}` };
      parentContext = {
        parentLabel: tx(parent.label),
        keyReminders: ctx.parentDisease === "acs"
          ? [
              { en: "Emergent culprit-only PCI is the priority intervention", id: "PCI culprit-only emergensi adalah intervensi prioritas" },
              { en: "Continue DAPT, anticoagulation, statin per ACS protocol", id: "Lanjutkan DAPT, antikoagulasi, statin sesuai protokol SKA" },
              { en: "Avoid β-blocker until shock resolved", id: "Hindari β-blocker hingga syok teratasi" },
              { en: "Coordinate with cath lab BEFORE leaving resuscitation area", id: "Koordinasi dengan cath lab SEBELUM meninggalkan area resusitasi" }
            ]
          : ctx.parentDisease === "adhf"
          ? [
              { en: "Continue decongestion (IV loop diuretic) once MAP restored", id: "Lanjutkan dekongesti (diuretik loop IV) setelah MAP pulih" },
              { en: "Hold ACEi/ARB/ARNI, MRA, β-blocker until off pressors", id: "Tunda ACEi/ARB/ARNI, MRA, β-blocker sampai lepas vasopresor" },
              { en: "Resume SGLT2-i and GDMT stepwise after stabilization", id: "Mulai kembali SGLT2-i dan GDMT bertahap setelah stabilisasi" }
            ]
          : ctx.parentDisease === "pulm_edema"
          ? [
              { en: "NIV/intubation per respiratory status", id: "NIV/intubasi sesuai status respirasi" },
              { en: "HOLD nitrates and routine diuretics until perfusion restored", id: "TUNDA nitrat dan diuretik rutin sampai perfusi pulih" },
              { en: "Once MAP ≥65 with pressor/inotrope → cautious IV diuretic for congestion", id: "Setelah MAP ≥65 dengan vasopresor/inotrop → diuretik IV hati-hati untuk kongesti" }
            ]
          : []
      };
    } else {
      diagnosis = { en: "Cardiogenic Shock", id: "Syok Kardiogenik" };
      const subMap = {
        ami: { en: "AMI-related cardiogenic shock", id: "Syok kardiogenik terkait AMI" },
        adhf: { en: "Decompensated HF — advanced shock", id: "Dekompensasi HF — syok lanjut" },
        mech: { en: "Mechanical-complication cardiogenic shock", id: "Syok kardiogenik komplikasi mekanis" },
        myocarditis: { en: "Fulminant myocarditis", id: "Miokarditis fulminan" },
        tachy: { en: "Tachyarrhythmia-driven shock", id: "Syok dipicu takiaritmia" },
        brady: { en: "Bradyarrhythmia-driven shock", id: "Syok dipicu bradiaritmia" },
        other: { en: "Cardiogenic shock — other etiology", id: "Syok kardiogenik — etiologi lain" }
      };
      const base = subMap[etiology] ? tx(subMap[etiology]) : "";
      subtitle = base + (a.scai ? ` · SCAI ${a.scai}` : "");
    }

    return {
      diagnosis, subtitle, cautions: flags,
      immediate, pharmacology: pharm,
      investigations, disposition,
      guideline: "ESC HF 2021 + 2023 update; SCAI SHOCK 2022; CULPRIT-SHOCK 2017; ECLS-SHOCK 2023; IABP-SHOCK II",
      parentContext
    };
  }
},

  getRecommendation: function(a, ctx) {
